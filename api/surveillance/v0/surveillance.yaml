openapi: 3.2.0
info:
  title: Standard Air Traffic Surveillance API Interfaces
  version: 0.1.0
  description: |-
    Interface to Discovery and Synchronization Service and service providers used by participating clients to discover and inform other service providers.

    Unless otherwise specified, fields specified in a message but not declared
    in the API must be ignored.

    Whenever a object-type field may be omitted, it may also be set to null for
    the same effect.
servers:
  - url: .
paths:
  /dss/traffic_surveilled_areas:
    summary: Set of Traffic Surveilled Areas in the DSS.
    description: ""
    get:
      tags:
        - dss
      operationId: searchTrafficSurveilledAreas
      parameters:
        - name: area
          description: The area in which to search for Traffic Surveilled Areas.  Some
            Traffic Surveilled Areas near this area but wholly outside it
            may also be returned.
          schema:
            $ref: "#/components/schemas/GeoPolygonString"
          in: query
          required: true
        - name: earliest_time
          description: If specified, indicates non-interest in any Traffic Surveilled
            Areas that end before this time.  RFC 3339 format, per OpenAPI
            specification. The time zone must be 'Z'.
          schema:
            format: date-time
            type: string
          in: query
          required: true
        - name: latest_time
          description: If specified, indicates non-interest in any Traffic Surveilled
            Areas that start after this time.  RFC 3339 format, per OpenAPI
            specification. The time zone must be 'Z'.
          schema:
            format: date-time
            type: string
          in: query
          required: true
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchTrafficSurveilledAreasResponse"
          description: Traffic Surveilled Areas were successfully retrieved.
        400:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: One or more input parameters were missing or invalid.
        401:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bearer access token was not provided in Authorization header, token
            could not be decoded, or token was invalid.
        403:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The access token was decoded successfully but did not include a
            scope appropriate to this endpoint.
        413:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The requested area was too large.
      security:
        - Authority:
            - surveillance.display_provider
      summary: /dss/traffic_surveilled_areas
      description: Retrieve all Traffic Surveilled Areas in the DAR for a given
        area during the given time.  Note that some Traffic Surveilled Areas
        returned may lie entirely outside the requested area.
  /dss/traffic_surveilled_areas/{id}:
    summary: An Traffic Surveilled Area in the DSS.
    get:
      tags:
        - dss
      operationId: getTrafficSurveilledArea
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTrafficSurveilledAreaResponse"
          description: Full information of the Traffic Surveilled Area was retrieved
            successfully.
        400:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: One or more input parameters were missing or invalid.
        401:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bearer access token was not provided in Authorization header, token
            could not be decoded, or token was invalid.
        403:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The access token was decoded successfully but did not include a
            scope appropriate to this endpoint.
        404:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The requested Entity could not be found.
      security:
        - Authority:
            - surveillance.display_provider
        - Authority:
            - surveillance.service_provider
      summary: /dss/traffic_surveilled_areas/{id}
      description: Retrieve full information of an Traffic Surveilled Area owned
        by the client.
    put:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrafficSurveilledAreaParameters"
        required: true
      tags:
        - dss
      operationId: createTrafficSurveilledArea
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutTrafficSurveilledAreaResponse"
          description: An existing Traffic Surveilled Area was created successfully in
            the DSS.
        400:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |-
            * One or more input parameters were missing or invalid.
            * The request attempted to mutate the Traffic Surveilled Area in a disallowed way.
        401:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bearer access token was not provided in Authorization header, token
            could not be decoded, or token was invalid.
        403:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The access token was decoded successfully but did not include a
            scope appropriate to this endpoint.
        409:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |-
            * An Traffic Surveilled Area with the specified ID already exists and is owned by a different client.
            * Despite repeated attempts, the DSS was unable to update the DAR because of other simultaneous changes.
        413:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The area of the Traffic Surveilled Area is too large.
      security:
        - Authority:
            - surveillance.service_provider
      summary: /dss/traffic_surveilled_areas/{id}
      description: |-
        Create a new Traffic Surveilled Area.  This call will fail if an Traffic Surveilled Area with the same ID already exists.

        The DSS assumes the USS has already added the appropriate retention period to operation end time in `time_end` field before storing it.
    parameters:
      - name: id
        description: EntityUUID of the Traffic Surveilled Area.
        schema:
          $ref: "#/components/schemas/EntityUUID"
        in: path
        required: true
  /dss/traffic_surveilled_areas/{id}/{version}:
    summary: A specific version of an Traffic Surveilled Area in the DSS.
    put:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrafficSurveilledAreaParameters"
        required: true
      tags:
        - dss
      operationId: updateTrafficSurveilledArea
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutTrafficSurveilledAreaResponse"
          description: An existing Traffic Surveilled Area was updated successfully in
            the DSS.
        400:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |-
            * One or more input parameters were missing or invalid.
            * The request attempted to mutate the Traffic Surveilled Area in a disallowed way.
        401:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bearer access token was not provided in Authorization header, token
            could not be decoded, or token was invalid.
        403:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The access token was decoded successfully but did not include a
            scope appropriate to this endpoint.
        409:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |-
            * The specified Traffic Surveilled Area's current version does not match the provided version.
            * Despite repeated attempts, the DSS was unable to update the DAR because of other simultaneous changes.
        413:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The area of the Traffic Surveilled Area is too large.
      security:
        - Authority:
            - surveillance.service_provider
      summary: /dss/traffic_surveilled_areas/{id}/{version}
      description: |-
        Update an Traffic Surveilled Area.  The full content of the existing Traffic Surveilled Area will be replaced with the provided information as only the most recent version is retained.

        The DSS assumes the USS has already added the appropriate retention period to operation end time in `time_end` field before storing it.  Updating `time_start` is not allowed if it is before the current time.
    delete:
      tags:
        - dss
      operationId: deleteTrafficSurveilledArea
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTrafficSurveilledAreaResponse"
          description: Traffic Surveilled Area was successfully deleted from DSS.
        400:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: One or more input parameters were missing or invalid.
        401:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bearer access token was not provided in Authorization header, token
            could not be decoded, or token was invalid.
        403:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |-
            * The access token was decoded successfully but did not include a scope appropriate to this endpoint.
            * The Traffic Surveilled Area does not belong to the client requesting deletion.
        404:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Entity could not be deleted because it could not be found.
        409:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |-
            * The specified Traffic Surveilled Area's current version does not match the provided version.
            * Despite repeated attempts, the DSS was unable to update the DAR because of other simultaneous changes.
      security:
        - Authority:
            - surveillance.service_provider
      summary: /dss/traffic_surveilled_areas/{id}/{version}
      description: Delete an Traffic Surveilled Area.  USSs should not delete
        Traffic Surveilled Areas before the end of the last managed flight
        plus the retention period.
    parameters:
      - name: id
        description: EntityUUID of the Traffic Surveilled Area.
        schema:
          $ref: "#/components/schemas/EntityUUID"
        in: path
        required: true
      - name: version
        description: Version string used to reference an Traffic Surveilled Area at
          a particular point in time. Any updates to an existing Identification
          Service Area must contain the corresponding version to maintain
          idempotent updates.
        schema:
          type: string
        in: path
        required: true
  /uss/flights/stream:
    description: This endpoint may be called by traffic display providers to receive
      real-time server sent events for manned aircraft flight information near a
      user.
    get:
      tags:
        - sp
      operationId: streamFlights
      responses:
        200:
          content:
            text/event-stream:
              itemSchema:
                $ref: "#/components/schemas/FlightEvent"
          description: Aircraft information was successfully retrieved.
        400:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: One or more input parameters were missing or invalid.
        401:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bearer access token was not provided in Authorization header, token
            could not be decoded, or token was invalid.
        403:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The access token was decoded successfully but did not include a
            scope appropriate to this endpoint.
        422:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The requested view is entirely outside any surveillance
            service provision areas (Traffic Service Area volumes) this provider
            has.
      security:
        - Authority:
            - surveillance.display_provider
      summary: /uss/aircraft
      description: Retrieve basic manned aircraft information from a surveillance service
        provider. This endpoint will be called by traffic display providers to
        display basic manned aircraft positions near a user in real time.
    parameters:
      - name: view
        description: "The area of this view: lat1,lng1,lat2,lng2. The view is the
          smallest box bounded by the provided corner points."
        schema:
          $ref: "#/components/schemas/View"
        in: query
        required: true
  /dss/subscriptions:
    summary: Subscriptions for airspace updates to a volume of interest.
    get:
      tags:
        - dss
      operationId: searchSubscriptions
      parameters:
        - name: area
          description: The area in which to search for Subscriptions.  Some Subscriptions
            near this area but wholly outside it may also be returned.
          schema:
            $ref: "#/components/schemas/GeoPolygonString"
          in: query
          required: true
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchSubscriptionsResponse"
          description: Subscriptions were retrieved successfully.
        400:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: One or more input parameters were missing or invalid.
        401:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bearer access token was not provided in Authorization header, token
            could not be decoded, or token was invalid.
        403:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The access token was decoded successfully but did not include a
            scope appropriate to this endpoint.
        413:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The requested area was too large.
      security:
        - Authority:
            - surveillance.display_provider
      summary: /dss/subscriptions
      description: |-
        Retrieve subscriptions intersecting an area of interest.  Subscription notifications are only triggered by (and contain full information of) changes to, creation of, or deletion of, Entities referenced by or stored in the DSS; they do not involve any data transfer (such as surveillance flights updates) apart from Entity information.

        Only Subscriptions belonging to the caller are returned.  This endpoint would be used if a USS lost track of Subscriptions they had created and/or wanted to resolve an error indicating that they had too many existing Subscriptions in an area.
  /dss/subscriptions/{id}:
    summary: Subscription for airspace updates to a volume of interest.
    get:
      tags:
        - dss
      operationId: getSubscription
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSubscriptionResponse"
          description: Subscription information was retrieved successfully.
        400:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: One or more input parameters were missing or invalid.
        401:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bearer access token was not provided in Authorization header, token
            could not be decoded, or token was invalid.
        403:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The access token was decoded successfully but did not include a
            scope appropriate to this endpoint.
        404:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: A Subscription with the specified ID was not found.
      security:
        - Authority:
            - surveillance.display_provider
        - Authority:
            - surveillance.service_provider
      summary: /dss/subscriptions/{id}
      description: Verify the existence/validity and state of a particular subscription.
    put:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionParameters"
        required: true
      tags:
        - dss
      operationId: createSubscription
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutSubscriptionResponse"
          description: A new Subscription was created successfully.
        400:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |-
            * One or more input parameters were missing or invalid.
            * The request attempted to mutate the Subscription in a disallowed way.
        401:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bearer access token was not provided in Authorization header, token
            could not be decoded, or token was invalid.
        403:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |-
            * The access token was decoded successfully but did not include a scope appropriate to this endpoint or the request.
        409:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |-
            * A Subscription with the specified ID already exists and is owned by a different client.
            * Despite repeated attempts, the DSS was unable to update the DAR because of other simultaneous changes.
        429:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Client already has too many Subscriptions in the area where a new
            Subscription was requested.  To correct this problem, the client may
            query GET /subscriptions to see which Subscriptions are counting
            against their limit.  This problem should not generally be
            encountered because the Subscription limit should be above what any
            consumer that reasonably aggregates their Subscriptions should
            request.  But, a Subscription limit is necessary to bound
            performance requirements for DSS instances and would likely be hit
            by, e.g., a large surveillance display provider that created a
            Subscription for each of their display client users' views.
      security:
        - Authority:
            - surveillance.display_provider
      summary: /dss/subscriptions/{id}
      description: |-
        Create a subscription.  This call will fail if a Subscription with the same ID already exists.

        Subscription notifications are only triggered by (and contain full information of) changes to, creation of, or deletion of, Entities referenced by or stored in the DSS; they do not involve any data transfer (such as flights updates) apart from Entity information.
    parameters:
      - name: id
        description: SubscriptionUUID of the subscription of interest.
        schema:
          $ref: "#/components/schemas/SubscriptionUUID"
        in: path
        required: true
  /dss/subscriptions/{id}/{version}:
    summary: Specific version of a Subscription for airspace updates to a volume of
      interest.
    put:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubscriptionParameters"
        required: true
      tags:
        - dss
      operationId: updateSubscription
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutSubscriptionResponse"
          description: An existing Subscription was updated successfully.
        400:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |-
            * One or more input parameters were missing or invalid.
            * The request attempted to mutate the Subscription in a disallowed way.
        401:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bearer access token was not provided in Authorization header, token
            could not be decoded, or token was invalid.
        403:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |-
            * The access token was decoded successfully but did not include a scope appropriate to this endpoint or the request.
        409:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |-
            * The specified Subscriptions's current version does not match the provided version.
            * Despite repeated attempts, the DSS was unable to update the DAR because of other simultaneous changes.
        429:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Client already has too many Subscriptions in the area where a new
            Subscription was requested.  To correct this problem, the client may
            query GET /subscriptions to see which Subscriptions are counting
            against their limit.  This problem should not generally be
            encountered because the Subscription limit should be above what any
            consumer that reasonably aggregates their Subscriptions should
            request.  But, a Subscription limit is necessary to bound
            performance requirements for DSS instances and would likely be hit
            by, e.g., a large surveillance display provider that created a
            Subscription for each of their display client users' views.
      security:
        - Authority:
            - surveillance.display_provider
      summary: /dss/subscriptions/{id}/{version}
      description: |-
        Update a Subscription.  The full content of the existing Subscription will be replaced with the provided information as only the most recent version is retained.

        Subscription notifications are only triggered by (and contain full information of) changes to, creation of, or deletion of, Entities referenced by or stored in the DSS; they do not involve any data transfer (such as flights updates) apart from Entity information.
    delete:
      tags:
        - dss
      operationId: deleteSubscription
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSubscriptionResponse"
          description: Subscription was deleted successfully.
        400:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: One or more input parameters were missing or invalid.
        401:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bearer access token was not provided in Authorization header, token
            could not be decoded, or token was invalid.
        403:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |-
            * The access token was decoded successfully but did not include a scope appropriate to this endpoint.
            * The Entity does not belong to the client requesting deletion.
        404:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Subscription could not be deleted because it could not be found.
        409:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |-
            * The specified Subscriptions's current version does not match the provided version.
            * Despite repeated attempts, the DSS was unable to update the DAR because of other simultaneous changes.
      security:
        - Authority:
            - surveillance.display_provider
      summary: /dss/subscriptions/{id}/{version}
      description: Delete a subscription.
    parameters:
      - name: id
        description: SubscriptionUUID of the subscription of interest.
        schema:
          $ref: "#/components/schemas/SubscriptionUUID"
        in: path
        required: true
      - name: version
        description: Version string used to reference a Subscription at a particular
          point in time. Any updates to an existing Subscription must contain
          the corresponding version to maintain idempotent updates.
        schema:
          type: string
        in: path
        required: true
  /uss/traffic_surveilled_areas/{id}:
    get:
      tags:
        - sp
      operationId: getTrafficSurveilledAreaDetails
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTrafficSurveilledAreaDetailsResponse"
          description: Details of the Traffic Surveilled Area were retrieved
            successfully.
        400:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: One or more input parameters were missing or invalid.
        401:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bearer access token was not provided in Authorization header, token
            could not be decoded, or token was invalid.
        403:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The access token was decoded successfully but did not include a
            scope appropriate to this endpoint.
        404:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The requested Entity could not be found.
      security:
        - Authority:
            - surveillance.display_provider
      summary: /uss/traffic_surveilled_areas/{id}
      description: Retrieve details of an Traffic Surveilled Area owned by the client.
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutTrafficSurveilledAreaNotificationParameters"
        required: true
      tags:
        - dp
      operationId: postTrafficSurveilledArea
      responses:
        204:
          description: Information for Traffic Surveilled Area was updated successfully.
        400:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |-
            * One or more parameters were missing or invalid.
            * The Traffic Surveilled Area information could not be parsed, or contains illegal data.
        401:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bearer access token was not provided in Authorization header, token
            could not be decoded, or token was invalid.
        403:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |-
            * The access token was decoded successfully but did not include a scope appropriate to this endpoint.
            * The client identified in the access token is not the owner of this Entity according to the receiving client's records.
        409:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: The Entity version specified in this message is identical to a
            previously-received notification and the Entity is different.
      security:
        - Authority:
            - surveillance.service_provider
      summary: /uss/traffic_surveilled_areas/{id}
      description: "Hosted by a surveillance display provider using Subscriptions:
        publish new full information of an Traffic Surveilled Area to the
        host of this endpoint (usually because of instructions from the DSS
        triggered by a subscription)."
    parameters:
      - name: id
        description: EntityUUID of the Traffic Surveilled Area.
        schema:
          $ref: "#/components/schemas/EntityUUID"
        in: path
        required: true
components:
  schemas:
    # Consistent with SCD / Remote ID
    View:
      description: "The area of this view: lat1,lng1,lat2,lng2. The view is the
        smallest box bounded by the provided corner points."
      type: string
      example: 29.97816,31.13296,29.98025,31.13535
    ErrorResponse:
      description: >-
        Human-readable string returned when an error occurs as a result of a USS
        - DSS transaction.
      type: object
      properties:
        message:
          description: >-
            Human-readable message indicating what error occurred and/or why.
          type: string
          example: The error occurred because [...]
    FlightEvent:
      type: object
      required:
        - data
      properties:
        data:
          type: string
          contentMediaType: application/json
          contentSchema:
            $ref: "#/components/schemas/Flight"
    Flight:
      type: object
      description: Description of flight.
      required:
        - aircraft_id
        - aircraft_type
        - current_state
        - source
      properties:
        aircraft_id:
          $ref: "#/components/schemas/AircraftId"
        aircraft_type:
          $ref: "#/components/schemas/AircraftType"
        current_state:
          $ref: "#/components/schemas/AircraftState"
        source:
          $ref: "#/components/schemas/DataSource"
    Time:
      required:
        - value
        - format
      type: object
      properties:
        value:
          type: string
          description: >-
            RFC3339-formatted time/date string.  The time zone must be 'Z'.
          format: date-time
          examples:
            - "1985-04-12T23:20:50.52Z"
        format:
          type: string
          enum:
            - RFC3339
    Radius:
      required:
        - value
        - units
      type: object
      properties:
        value:
          format: float
          description: >-
            Distance from the centerpoint of a circular area, along the WGS84
            ellipsoid.
          type: number
          minimum: 0
          exclusiveMinimum: true
          examples:
            - 300.183
        units:
          type: string
          description: >-
            FIXM-compatible units.  Only meters ("M") are acceptable for UTM.
          enum:
            - M
    Circle:
      description: A circular area on the surface of the earth.
      type: object
      properties:
        center:
          $ref: "#/components/schemas/LatLngPoint"
        radius:
          $ref: "#/components/schemas/Radius"
    Volume3D:
      description: >-
        A three-dimensional geographic volume consisting of a
        vertically-extruded shape. Exactly one outline must be specified.
      type: object
      properties:
        outline_circle:
            $ref: "#/components/schemas/Circle"
            description: A circular geographic shape on the surface of the earth.
        outline_polygon:
            $ref: "#/components/schemas/Polygon"
            description: >-
              A polygonal geographic shape on the surface of the earth.
        altitude_lower:
          description: >-
            Minimum bounding altitude of this volume. Must be less than
            altitude_upper, if specified.
          $ref: "#/components/schemas/Altitude"
        altitude_upper:
          description: >-
            Maximum bounding altitude of this volume. Must be greater than
            altitude_lower, if specified.
          $ref: "#/components/schemas/Altitude"
    Volume4D:
      description: Contiguous block of geographic spacetime.
      required:
        - volume
      type: object
      properties:
        volume:
          $ref: "#/components/schemas/Volume3D"
        time_start:
          description: Beginning time of this volume. Must be before time_end.
          $ref: "#/components/schemas/Time"
        time_end:
          description: End time of this volume. Must be after time_start.
          $ref: "#/components/schemas/Time"
    GetSubscriptionResponse:
      description: Response to DSS request for the subscription with the given id.
      required:
        - subscription
      type: object
      properties:
        subscription:
          $ref: "#/components/schemas/Subscription"
    SearchSubscriptionsResponse:
      description: Response to DSS query for subscriptions in a particular area.
      type: object
      properties:
        subscriptions:
          description: Subscriptions that overlap the specified area.
          type: array
          items:
            $ref: "#/components/schemas/Subscription"
          default: []
    URL:
      description: Valid http or https URL.
      type: string
    SubscriptionNotificationIndex:
      format: int32
      description: Tracks the notifications sent for a subscription so the subscriber
        can detect missed notifications more easily.
      type: integer
    SubscriptionState:
      description: State of Subscription which is causing a notification to be sent.
      required:
        - subscription_id
      type: object
      properties:
        subscription_id:
          $ref: "#/components/schemas/SubscriptionUUID"
        notification_index:
          $ref: "#/components/schemas/SubscriptionNotificationIndex"
          default: 0
    UUIDv4:
      description: UUID v4.
      maxLength: 36
      minLength: 36
      type: string
      example: 03e5572a-f733-49af-bc14-8a18bd53ee39
    Version:
      description: A version string used to reference an object at a particular point
        in time. Any updates to an object must contain the corresponding version
        to maintain idempotent updates.
      type: string
    EntityUUID:
      $ref: "#/components/schemas/UUIDv4"
      description: Universally-unique identifier for an Entity communicated through
        the DSS.  Formatted as UUIDv4.
    SubscriptionUUID:
      $ref: "#/components/schemas/UUIDv4"
      description: Universally-unique identifier for a Subscription communicated
        through the DSS.  Formatted as UUIDv4.
    DeleteSubscriptionResponse:
      description: Response for a successful request to delete an Subscription.
      required:
        - subscription
      type: object
      properties:
        subscription:
          $ref: "#/components/schemas/Subscription"
          description: The Subscription which was deleted.
    AircraftPosition:
      description: Position of an aircraft.
      type: object
      properties:
        lat:
          $ref: "#/components/schemas/Latitude"
        lng:
          $ref: "#/components/schemas/Longitude"
        alt:
          format: float
          description: "Geodetic altitude (NOT altitude above launch, altitude above
            ground, or EGM96): aircraft distance above the WGS84 ellipsoid as
            measured along a line that passes through the aircraft and is normal
            to the surface of the WGS84 ellipsoid.  This value is provided in
            meters and must have a minimum resolution of 1 meter.  Invalid, No
            Value or Unknown is -1000 m."
          type: number
          examples:
            - 1321.2
          default: -1000
        pressure_altitude:
          format: float
          description: The uncorrected altitude (based on reference standard 29.92 inHg,
            1013.25 mb) provides a reference for algorithms that utilize
            "altitude deltas" between aircraft.  This value is provided in
            meters and must have a minimum resolution of 1 meter.  Invalid, No
            Value or Unknown is -1000 m.
          type: number
          default: -1000
    DataSource:
      type: object
      required:
        - id
        - format
        - data
      properties:
        id:
          description: Data source identifier
          type: string
        format:
          description: Data source data format
          type: string
          examples:
            - "asterix-cat21"
        data:
          description: Raw data
          type: string
          format: base64
    GeoPolygonString:
      description: |-
        Plain-string representation of a geographic polygon consisting of at least three geographic
        points describing a closed polygon on the earth.  Each point consists of latitude,longitude
        in degrees.  Points are also comma-delimited, so this parameter will look like
        `lat1,lng1,lat2,lng2,lat3,lng3,...`  Latitude values must fall in the range [-90, 90] and
        longitude values must fall in the range [-180, 180].

        All of the requirements and clarifications for Polygon apply to GeoPolygonString as well.
      type: string
    Latitude:
      format: double
      description: Degrees of latitude north of the equator, with reference to the
        WGS84 ellipsoid.  Invalid, No Value, or Unknown is 0 degrees (both
        Lat/Lon).
      minimum: -90
      maximum: 90
      exclusiveMaximum: true
      exclusiveMinimum: true
      type: number
      examples:
        - 34.123
      default: 0
    Longitude:
      format: double
      description: Degrees of longitude east of the Prime Meridian, with reference to
        the WGS84 ellipsoid.  Invalid, No Value, or Unknown is 0 degrees (both
        Lat/Lon).
      minimum: -180
      maximum: 180
      exclusiveMaximum: true
      exclusiveMinimum: true
      type: number
      examples:
        - -118.456
      default: 0
    LatLngPoint:
      description: Point on the earth's surface.
      required:
        - lat
        - lng
      type: object
      properties:
        lng:
          $ref: "#/components/schemas/Longitude"
        lat:
          $ref: "#/components/schemas/Latitude"
    Altitude:
      type: object
      required:
        - value
        - reference
        - units
      properties:
        value:
          description: >-
            The numeric value of the altitude. Note that min and max values are
            added as a sanity check. As use cases evolve and more options are
            made available in terms of units of measure or reference systems,
            these bounds may be re-evaluated. Invalid, No Value, or Unknown is
            –1000 m.
          type: number
          format: double
          minimum: -8000
          maximum: 100000
          exclusiveMinimum: true
          exclusiveMaximum: true
          examples:
            - 19.5
        reference:
          description: >-
            A code indicating the reference for a vertical distance. See AIXM
            5.1 and FIXM 4.2.0. Currently, UTM only allows WGS84 with no
            immediate plans to allow other options. FIXM and AIXM allow for
            'SFC' which is equivalent to AGL.
          type: string
          enum:
            - W84
        units:
          description: >-
            The reference quantities used to express the value of altitude. See
            FIXM 4.2. Currently, UTM only allows meters with no immediate plans
            to allow other options.
          type: string
          enum:
            - M
    AircraftId:
      description: Identification of the aircraft. At least one field of this object
        must be specified.
      type: object
      properties:
        icao:
          description: The ICAO hex code broadcast by the transponder. This is a six-digit
            hexadecimal [0-9,a-f] code.
          type: string
          examples:
            - abcd01
        icao_type:
          description: The standard aircraft type code as published by the ICAO. For
            example, a Cessna 172 is “C172” and a Boeing 777-300 is “B773”
          type: string
          examples:
            - C172
            - B773
        registration:
          description: Aircraft Registration or “Tail Number”. These should be entered in
            all caps.
          type: string
          examples:
            - N123AB
    AircraftType:
      enum:
        - NotDeclared
        - Aeroplane
        - Helicopter
        - Gyroplane
        - HybridLift
        - Ornithopter
        - Glider
        - Kite
        - FreeBalloon
        - CaptiveBalloon
        - Airship
        - FreeFallOrParachute
        - Rocket
        - TetheredPoweredAircraft
        - GroundObstacle
        - Other
      type: string
      default: NotDeclared
    AircraftState:
      type: object
      required:
        - timestamp
        - position
      properties:
        timestamp:
          description: Time at which this state was valid.  This may be the time coming
            from the source, such as a GPS, or the time when the system computes
            the values using an algorithm such as an Extended Kalman Filter
            (EKF).  Timestamp must be expressed with a minimum resolution of
            1/10th of a second.
          $ref: "#/components/schemas/Time"
        position:
          $ref: "#/components/schemas/AircraftPosition"
        track:
          format: float
          description: Direction of flight expressed as a "True North-based" ground track
            angle.  This value is provided in clockwise degrees with a minimum
            resolution of 1 degree.  If aircraft is not moving horizontally, use
            the "Unknown" value.  A value of 361 indicates invalid, no value, or
            unknown.
          minimum: 0
          maximum: 361
          exclusiveMaximum: true
          exclusiveMinimum: true
          type: number
          default: 361
        speed:
          format: float
          description: Ground speed of flight in meters per second.  Invalid, No Value, or
            Unknown is 255 m/s, if speed is >254.25 m/s then report 254.25 m/s.
          minimum: 0
          exclusiveMinimum: true
          type: number
          examples:
            - 1.9
          default: 255
        vertical_speed:
          format: float
          description: Speed up (vertically) WGS84-HAE, m/s.  Invalid, No Value, or
            Unknown is 63 m/s, if speed is >62 m/s then report 62 m/s.
          type: number
          examples:
            - 0.2
          default: 63
    Polygon:
      description: >-
        An enclosed area on the earth. The bounding edges of this polygon are
        defined to be the shortest paths between connected vertices.  This
        means, for instance, that the edge between two points both defined at a
        particular latitude is not generally contained at that latitude. The
        winding order must be interpreted as the order which produces the
        smaller area. The path between two vertices is defined to be the
        shortest possible path between those vertices. Edges may not cross.
        Vertices may not be duplicated.  In particular, the final polygon vertex
        must not be identical to the first vertex.
      required:
        - vertices
      type: object
      properties:
        vertices:
          minItems: 3
          type: array
          items:
            $ref: "#/components/schemas/LatLngPoint"
    PutTrafficSurveilledAreaResponse:
      description: Response to a request to create or update a reference to an
        Traffic Surveilled Area in the DSS.
      required:
        - service_area
      type: object
      properties:
        subscribers:
          description: DSS subscribers that this client now has the obligation to notify
            of the Traffic Surveilled Area changes just made.  This client
            must call POST for each provided URL according to the
            `/uss/traffic_surveilled_areas/{id}` path API.
          type: array
          items:
            $ref: "#/components/schemas/SubscriberToNotify"
          default: []
        service_area:
            $ref: "#/components/schemas/TrafficSurveilledArea"
            description: Resulting surveilled area stored in DSS.
    SearchTrafficSurveilledAreasResponse:
      description: Response to DSS query for Traffic Surveilled Areas in an area
        of interest.
      type: object
      properties:
        service_areas:
          description: Traffic Surveilled Areas in the area of interest.
          type: array
          items:
            $ref: "#/components/schemas/TrafficSurveilledArea"
          default: []
    PutTrafficSurveilledAreaNotificationParameters:
      description: Parameters of a message informing of new full information for an
        Traffic Surveilled Area.  Pushed (by a client, not the DSS) directly
        to clients with subscriptions when another client makes a change to
        airspace within a cell with a subscription.
      required:
        - subscriptions
      type: object
      properties:
        service_area:
          $ref: "#/components/schemas/TrafficSurveilledArea"
          description: |-
            Traffic Surveilled Area that the notifying client changed or created.

            If this field is populated, the Traffic Surveilled Area was created or updated.  If this field is not populated, the Traffic Surveilled Area was deleted.
        subscriptions:
          description: Subscription(s) prompting this notification.
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SubscriptionState"
        extents:
          $ref: "#/components/schemas/Volume4D"
          description: |-
            The new or updated extents of the Traffic Surveilled Area.

            Omitted if Traffic Surveilled Area was deleted.
    SubscriberToNotify:
      description: Subscriber to notify of a creation/change/deletion of a change in
        the airspace.  This is provided by the DSS to a client changing the
        airspace, and it is the responsibility of the client changing the
        airspace (they will receive a set of these notification requests) to
        send a notification to each specified `url`.
      required:
        - subscriptions
        - url
      type: object
      properties:
        subscriptions:
          description: Subscription(s) prompting this notification.
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SubscriptionState"
        url:
          $ref: "#/components/schemas/URL"
          description: The endpoint that the client mutating the airspace should provide
            the update to.  API depends on the DSS action taken that triggered
            this notification request.
    DeleteTrafficSurveilledAreaResponse:
      description: Response for a request to delete an Traffic Surveilled Area.
      required:
        - service_area
      type: object
      properties:
        service_area:
          $ref: "#/components/schemas/TrafficSurveilledArea"
          description: Traffic Surveilled Area that was just deleted.
        subscribers:
          description: DSS subscribers that this client now has the obligation to notify
            of the Traffic Surveilled Area just deleted.  This client must
            call POST for each provided URL according to the
            `/uss/traffic_surveilled_areas` path API.
          type: array
          items:
            $ref: "#/components/schemas/SubscriberToNotify"
          default: []
    PutSubscriptionResponse:
      description: Response for a request to create or update a subscription.
      required:
        - subscription
      type: object
      properties:
        service_areas:
          description: Traffic Surveilled Areas in or near the subscription area at
            the time of creation/update, if `traffic_surveilled_area_url`
            callback was specified.
          type: array
          items:
            $ref: "#/components/schemas/TrafficSurveilledArea"
          default: []
        subscription:
          $ref: "#/components/schemas/Subscription"
          description: Result of the operation on the subscription.
    GetTrafficSurveilledAreaResponse:
      description: Response to DSS request for the surveilled area with
        the given ID.
      required:
        - service_area
      type: object
      properties:
        service_area:
          $ref: "#/components/schemas/TrafficSurveilledArea"
    GetTrafficSurveilledAreaDetailsResponse:
      description: Response to request for the details of an surveilled
        area with the given ID.
      required:
        - extents
      type: object
      properties:
        extents:
          $ref: "#/components/schemas/Volume4D"
          description: The extents of the Traffic Surveilled Area.
    CreateTrafficSurveilledAreaParameters:
      description: Parameters for a request to create an Traffic Surveilled Area
        in the DSS.
      required:
        - extents
        - uss_base_url
      type: object
      properties:
        extents:
          $ref: "#/components/schemas/Volume4D"
          description: |-
            The bounding spacetime extents of this Traffic Surveilled Area.  End time must be specified.  If start time is not specified, it will be set to the current time.  Start times in the past should be rejected by the DSS, except that it may adjust very recent start times to the current time.

            These extents should not reveal any sensitive information about the flight or flights within them.  This means, for instance, that extents should not tightly-wrap a flight path, nor should they generally be centered around the takeoff point of a single flight.
        uss_base_url:
          $ref: "#/components/schemas/FlightsUSSBaseURL"
    UpdateTrafficSurveilledAreaParameters:
      description: Parameters for a request to update an Traffic Surveilled Area
        in the DSS.
      required:
        - extents
        - uss_base_url
      type: object
      properties:
        extents:
          $ref: "#/components/schemas/Volume4D"
          description: |-
            The bounding spacetime extents of this Traffic Surveilled Area.  End time must be specified.  If start time is not specified, it will remain unchanged.  Start times in the past should be rejected by the DSS unless they are unchanged from the Traffic Surveilled Area's current start time.

            These extents should not reveal any sensitive information about the flight or flights within them.  This means, for instance, that extents should not tightly-wrap a flight path, nor should they generally be centered around the takeoff point of a single flight.
        uss_base_url:
          $ref: "#/components/schemas/FlightsUSSBaseURL"
    CreateSubscriptionParameters:
      description: Parameters for a request to create a subscription in the DSS.
      required:
        - extents
        - uss_base_url
      type: object
      properties:
        extents:
          $ref: "#/components/schemas/Volume4D"
          description: |-
            The spacetime extents of the volume to subscribe to.

            This subscription will automatically be deleted after its end time if it has not been refreshed by then.  If end time is not specified, the value will be chosen automatically by the DSS.

            Note that some Entities triggering notifications may lie entirely outside the requested area.
        uss_base_url:
          $ref: "#/components/schemas/SubscriptionUSSBaseURL"
    UpdateSubscriptionParameters:
      description: Parameters for a request to update a subscription in the DSS.
      required:
        - extents
        - uss_base_url
      type: object
      properties:
        extents:
          $ref: "#/components/schemas/Volume4D"
          description: |-
            The spacetime extents of the volume to subscribe to.

            This subscription will automatically be deleted after its end time if it has not been refreshed by then.  If end time is not specified, the value will be chosen automatically by the DSS.

            Note that some Entities triggering notifications may lie entirely outside the requested area.
        uss_base_url:
          $ref: "#/components/schemas/SubscriptionUSSBaseURL"
    Subscription:
      description: Specification of a geographic area that a client is interested in
        on an ongoing basis (e.g., "planning area").  Internal to the DSS.
      required:
        - id
        - uss_base_url
        - owner
        - version
      type: object
      properties:
        id:
          $ref: "#/components/schemas/SubscriptionUUID"
          description: Unique identifier for this subscription.
        uss_base_url:
          $ref: "#/components/schemas/SubscriptionUSSBaseURL"
        owner:
          description: Assigned by the DSS based on creating client's ID (via access
            token).  Used for restricting mutation and deletion operations to
            owner.
          type: string
          example: myuss
        notification_index:
          $ref: "#/components/schemas/SubscriptionNotificationIndex"
          default: 0
        time_end:
          description: If set, this subscription will be automatically removed after this
            time.
          $ref: "#/components/schemas/Time"
        time_start:
          description: If set, this Subscription will not generate any notifications
            before this time.
          $ref: "#/components/schemas/Time"
        version:
          $ref: "#/components/schemas/Version"
    TrafficSurveilledArea:
      description: An Traffic Surveilled Area (area in which surveillance services
        are being provided).  The DSS reports only these declarations and
        clients must exchange flight information peer-to-peer.
      required:
        - uss_base_url
        - owner
        - time_start
        - time_end
        - version
        - id
      type: object
      properties:
        uss_base_url:
          $ref: "#/components/schemas/FlightsUSSBaseURL"
        owner:
          description: Assigned by the DSS based on creating client's ID (via access
            token).  Used for restricting mutation and deletion operations to
            owner.
          type: string
          example: myuss
        time_start:
          description: Beginning time of service.
          $ref: "#/components/schemas/Time"
        time_end:
          description: End time of service.
          $ref: "#/components/schemas/Time"
        version:
          $ref: "#/components/schemas/Version"
        id:
          $ref: "#/components/schemas/EntityUUID"
          description: Unique identifier for this Traffic Surveilled Area.
    USSBaseURL:
      description: |-
        The base URL of a USS implementation of part or all of the surveillance USS-USS API. Per the USS-USS API, the full URL
        of a particular resource can be constructed by appending, e.g., `/uss/{resource}/{id}` to this base URL.
        Accordingly, this URL may not have a trailing '/' character.
      type: string
      example: https://example.com/ti
    SubscriptionUSSBaseURL:
      description: Base URL for the USS's implementation of the USS API, including the
        POST traffic_surveilled_areas endpoint where notifications for this
        Subscription will be received.
      $ref: "#/components/schemas/USSBaseURL"
    FlightsUSSBaseURL:
      description: Base URL for the USS's implementation of the USS API, including the
        GET flights and GET flights/{id}/details endpoints where flight
        information can be obtained.
      $ref: "#/components/schemas/USSBaseURL"
  securitySchemes:
    Authority:
      flows:
        clientCredentials:
          tokenUrl: https://auth.example.com/oauth/token
          scopes:
            surveillance.display_provider: Client may query, read, or create subscriptions for
              Traffic Surveilled Areas for surveillance. A
              surveillance display provider should be granted this scope
              upon request.
            surveillance.service_provider: Client may create, edit, and delete Identification
              Service Areas for surveillance. A surveillance
              service provider should be granted this scope upon request.
      type: oauth2
      description: >-
        Authorization from, or on behalf of, an authorization authority.  This
        authority will issue access tokens that are JSON Web Tokens as defined
        in RFC 7519, using the `RS256` algorithm for the signature, publish to
        all providers the public key for verifying that signature, and implement
        standard OAuth server discovery mechanisms as described in RFC 8414.

        The following fields must be included in the JWT claim for access tokens
        issued by this authority:

        * `iss`, with the URL at which the token generation request was
        received.

        * `exp`, with a time no further than 1 hour in the future.

        * `sub`, with unique ID of the client requesting the access token.

        * `scope`, with a string composed of a space-separated list of strings
        indicating the scopes granted, per RFC 6749.

        * `jti`, according to RFC 7519.

        Following the principle of least privilege, only one of the scopes
        enumerated in this document should usually be granted in a single token
        (though other scopes may accompany it).  The tokens granted by this
        authority must protect against reuse of received tokens to impersonate
        the sender to other recipients (via use of the `aud` claim or other
        means).

        When using the `aud` claim to protect against the reuse of received
        tokens, and absent guidance on behalf of the competent authority to the
        contrary, the JWT `aud` claim requested by the client must be included
        in each access token and must contain the fully qualified domain name of
        the URL the access token will be used to access.  For example, if a USS
        were querying the endpoint at
        https://dss.example.com:8888/surveillance/dss/traffic_surveilled_areas, the access
        token included in the request should specify `"aud": "dss.example.com"`.

        Clients must provide these access tokens in an `Authorization` header in
        the form `Bearer <token>` in accordance with RFC 6750.
security:
  - Authority:
      - surveillance.display_provider
      - surveillance.service_provider
tags:
  - name: dss
    description: Endpoints exposed by the DSS server.
  - name: sp
    description: Endpoints exposed by surveillance service providers for
      peer-peer communication.
  - name: dp
    description: Endpoints exposed by surveillance display providers for
      peer-peer communication.